# Qwen3.5 Model Catalog
# Generated: 2026-03-15
# Sources: HuggingFace model repos (Qwen, unsloth, bartowski, mlx-community)
#
# Architecture: Qwen3.5 uses a hybrid of Gated DeltaNet (linear attention) and
# Gated Attention (full quadratic attention) in a repeating 3:1 pattern
# (full_attention_interval = 4). All models are multimodal (image-text-to-text).
#
# Naming: Default models (e.g. Qwen3.5-9B) are instruction-tuned.
#         Base (pre-trained only) variants use the -Base suffix.
#
# Vocab: 248,320 tokens. Max context: 262,144 (256K), extensible to ~1M via YaRN.
#
# For estimator purposes, only GGUF and MLX artifacts are listed (Phase 1 backends).
# GPTQ/FP8 Transformers variants exist but are not relevant for local inference.

