# Apple Silicon Chip Specifications
# Sources: Apple product pages, Apple Newsroom press releases
#
# GPU cores listed are the maximum configuration for each chip tier.
# Some chips ship in binned variants with fewer GPU cores (noted in comments).
# Ultra variants are two Max dies fused via UltraFusion (specs ~2x Max).

# ============================================================================
# M1 Family (2020-2022)
# ============================================================================

[[chips]]
chip_identifier = "Apple M1"
memory_bandwidth_gbps = 68.25
gpu_cores = 8           # Also available as 7-core GPU variant
ane_tops = 11.0
cpu_performance_cores = 4
cpu_efficiency_cores = 4
available_memory_gb = [8, 16]

[[chips]]
chip_identifier = "Apple M1 Pro"
memory_bandwidth_gbps = 200.0
gpu_cores = 16          # Also available as 14-core GPU variant
ane_tops = 11.0
cpu_performance_cores = 8
cpu_efficiency_cores = 2
available_memory_gb = [16, 32]

[[chips]]
chip_identifier = "Apple M1 Max"
memory_bandwidth_gbps = 400.0
gpu_cores = 32          # Also available as 24-core GPU variant
ane_tops = 11.0
cpu_performance_cores = 8
cpu_efficiency_cores = 2
available_memory_gb = [32, 64]

[[chips]]
chip_identifier = "Apple M1 Ultra"
memory_bandwidth_gbps = 800.0
gpu_cores = 64          # Also available as 48-core GPU variant
ane_tops = 22.0
cpu_performance_cores = 16
cpu_efficiency_cores = 4
available_memory_gb = [64, 128]

